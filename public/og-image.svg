<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#001F3F"/>

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Orange accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#F39825"/>

  <!-- Brand mark icon (V chevrons + circle) — scaled up, centered left -->
  <!-- Lower V chevron -->
  <g transform="translate(100, 180) scale(0.52)">
    <path fill="#F39825" d="M54.5 186.64 L144.19 0 L233.88 186.64 L210.57 186.64 L144.19 53.72 L77.81 186.64 Z"/>
    <!-- Circle -->
    <circle cx="144" cy="230" r="42" fill="none" stroke="#F39825" stroke-width="12"/>
    <!-- Upper V chevron -->
    <path fill="#F39825" d="M54.5 280 L144.19 93.36 L233.88 280 L210.57 280 L144.19 147.08 L77.81 280 Z"/>
  </g>

  <!-- Company name -->
  <text x="340" y="270" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Idariji Concept</text>

  <!-- Tagline -->
  <text x="342" y="330" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.65)" letter-spacing="1">Building Brands. Driving Growth. Delivering Results.</text>

  <!-- Divider line -->
  <rect x="342" y="365" width="600" height="2" fill="#F39825" opacity="0.6"/>

  <!-- Services row -->
  <text x="342" y="410" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" letter-spacing="2">BRANDING · DIGITAL MARKETING · BUSINESS DEVELOPMENT</text>

  <!-- Location -->
  <text x="342" y="460" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)">Lagos &amp; Ibadan, Nigeria</text>

  <!-- Website URL -->
  <text x="342" y="560" font-family="Arial, sans-serif" font-size="22" fill="#F39825" letter-spacing="0.5">idarijiconcept.com</text>
</svg>
